# This is a Databricks asset bundle definition for cicd.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: cicd
  uuid: d97f5260-ce19-4ec2-80a7-b0b9ddb3f04a

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-0751fe6e-9372.cloud.databricks.com
    variables:
      catalog: cicd_dev
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://dbc-0751fe6e-9372.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/ankepallimaheshreddy@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/ankepallimaheshreddy@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: cicd_dev
      schema: prod
    permissions:
      - user_name: ankepallimaheshreddy@gmail.com
        level: CAN_MANAGE
